name: Download Pages with Playwright

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright
        npx playwright install chromium
    
    - name: Create download script
      run: |
        cat > download.js << 'EOF'
        const { chromium } = require('playwright');
        const fs = require('fs');
        const path = require('path');
        
        const urls = fs.readFileSync('urls.txt', 'utf8')
          .split('\n')
          .map(l => l.trim())
          .filter(l => l && !l.startsWith('#'));
        
        async function downloadPage(url) {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          
          // Set real browser user agent
          await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          
          try {
            console.log(`Processing: ${url}`);
            await page.goto(url, { waitUntil: 'networkidle', timeout: 30000 });
            
            // Get the fully rendered HTML
            const html = await page.content();
            
            const domain = new URL(url).hostname.replace(/\./g, '_');
            const outputFile = path.join('downloaded_pages', `${domain}.html`);
            
            fs.writeFileSync(outputFile, html);
            console.log(`✅ Saved: ${domain}.html (${(html.length / 1024).toFixed(1)} KB)`);
          } catch (error) {
            console.error(`❌ Failed: ${url} - ${error.message}`);
          } finally {
            await browser.close();
          }
        }
        
        async function main() {
          if (!fs.existsSync('downloaded_pages')) {
            fs.mkdirSync('downloaded_pages');
          }
          
          for (const url of urls) {
            await downloadPage(url);
            await new Promise(r => setTimeout(r, 3000)); // Wait 3 seconds between requests
          }
          
          // Create index page
          let index = '<!DOCTYPE html><html><head><title>Downloaded Pages</title></head><body><h1>Downloaded Pages</h1><ul>';
          const files = fs.readdirSync('downloaded_pages');
          files.forEach(file => {
            if (file !== 'index.html') {
              index += `<li><a href="${file}">${file.replace('.html', '')}</a></li>`;
            }
          });
          index += '</ul></body></html>';
          fs.writeFileSync('downloaded_pages/index.html', index);
          
          console.log('\n✨ Complete!');
        }
        
        main();
        EOF
    
    - name: Run download script
      run: node download.js
    
    - name: Commit and push
      uses: EndBug/add-and-commit@v9
      with:
        add: 'downloaded_pages/'
        message: 'Download web pages'
        default_author: github_actions
        token: ${{ secrets.GITHUB_TOKEN }}
