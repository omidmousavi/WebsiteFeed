name: Download Pages with Inliner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install inliner
      run: npm install -g inliner
    
    - name: Download and inline pages
      run: |
        mkdir -p downloaded_pages
        
        while IFS= read -r url; do
          [[ -z "$url" || "$url" =~ ^# ]] && continue
          
          echo "Processing: $url"
          filename=$(echo "$url" | sed -E 's|https?://||' | sed 's|/|_|g' | sed 's|\.|_|g')
          
          # Use inliner with custom user agent header
          inliner -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' "$url" > "downloaded_pages/${filename}.html"
          
          echo "✅ Saved: ${filename}.html"
          sleep 2
        done < urls
    
    - name: Create index page
      run: |
        cat > downloaded_pages/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
          <title>Downloaded Pages</title>
          <style>
            body { font-family: Arial, sans-serif; margin: 40px; }
            h1 { color: #333; }
            ul { list-style: none; padding: 0; }
            li { margin: 10px 0; }
            a { color: #0366d6; text-decoration: none; }
            a:hover { text-decoration: underline; }
          </style>
        </head>
        <body>
          <h1>📥 Downloaded Web Pages</h1>
          <ul>
            $(for f in downloaded_pages/*.html; do
              if [ "$(basename "$f")" != "index.html" ]; then
                echo "<li><a href=\"$(basename "$f")\">$(basename "$f" .html | sed 's/_/./g')</a></li>"
              fi
            done)
          </ul>
        </body>
        </html>
        EOF
    
    - name: Commit and push
      uses: EndBug/add-and-commit@v9
      with:
        add: 'downloaded_pages/'
        message: 'Download web pages with inliner'
        default_author: github_actions
        token: ${{ secrets.GITHUB_TOKEN }}
