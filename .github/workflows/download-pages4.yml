name: Download Page with Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download pages with assets
      run: |
        mkdir -p downloaded_pages
        
        while IFS= read -r url; do
          [[ -z "$url" || "$url" =~ ^# ]] && continue
          
          echo "Downloading: $url"
          domain=$(echo "$url" | sed -E 's|https?://||' | sed 's|/.*||' | sed 's|\.|_|g')
          
          # Download HTML + CSS + JS + Images (1 level deep, no recursion)
          wget \
            --page-requisites \
            --adjust-extension \
            --convert-links \
            --span-hosts \
            --level=1 \
            --no-parent \
            --timeout=30 \
            --tries=2 \
            --user-agent="Mozilla/5.0" \
            --directory-prefix="downloaded_pages/$domain" \
            "$url"
          
          echo "✅ Saved: $domain"
          echo ""
          
        done < urls
    
    - name: Commit and push
      uses: EndBug/add-and-commit@v9
      with:
        add: 'downloaded_pages/'
        message: 'Download pages with assets'
        default_author: github_actions
        token: ${{ secrets.GITHUB_TOKEN }}
