name: Download Web Pages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

# Add this permissions block
permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4
    
    - name: Create output directory
      run: mkdir -p downloaded_pages

    - name: Run download script
      run: |
        python download_pages.py https://ir.voanews.com/ downloaded_pages/ir.voanews.com.html
        python download_pages.py https://www.radiofarda.com/ downloaded_pages/radiofarda.com.html
    
    - name: Commit and push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase
        git add downloaded_pages/
        git commit -m "Update downloaded pages - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push
